<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- TV browsers default to a desktop-width viewport; pin to device width and lock zoom for the 10-foot UI. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <title>Space Console</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <!-- safe-area wrapper protects against TV overscan; see --safe-* in style.css -->
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">Space&nbsp;Console</span>
      </div>
      <div class="players" id="players" aria-label="Connected players">
        <div class="players__join">
          <span class="players__label">Join at</span>
          <span class="players__url" id="joinUrl">play.spaceconsole.tv</span>
          <span class="players__code" id="roomCode">····</span>
        </div>
        <ul class="players__list" id="playerList"></ul>
      </div>
      <div class="clock" id="clock" aria-hidden="true">--:--</div>
    </header>

    <main class="stage">
      <section class="hero" id="hero" aria-live="polite">
        <div class="hero__content" id="heroContent"></div>
        <aside class="hero__join" id="heroJoin" hidden>
          <span class="hero__join-label">Scan to join</span>
          <div class="hero__qr" id="joinQr"></div>
        </aside>
      </section>

      <!-- Category filter chips (built by app.js). Selecting one narrows the
           rails below to that category; "All" shows every row. -->
      <nav class="filters" id="filters" aria-label="Filter games"></nav>

      <!-- One horizontal rail per category (built by app.js). The region scrolls
           vertically between categories; each rail scrolls horizontally. -->
      <section class="rails" id="gameGrid" aria-label="Games"></section>
    </main>

    <footer class="hintbar" id="hintbar">
      <span class="hint"><kbd class="key">↑↓←→</kbd> Navigate</span>
      <span class="hint"><kbd class="key">Enter</kbd> Launch</span>
      <span class="hint"><kbd class="key">Back</kbd> Return</span>
    </footer>
  </div>

  <!-- Persistent game shell: games load here instead of a full navigation, so
       the launcher (and its live WebRTC controller links) survives launch.
       allow same-origin only; no extra capabilities granted to the game. -->
  <iframe id="gameFrame" class="gameframe" title="Game" hidden></iframe>

  <!-- In-game HUD: overlays the running game with the room code + a rejoin QR +
       the live roster, so a dropped player can rescan and rejoin (keeping their
       seat) without anyone leaving the game. -->
  <div class="gamehud" id="gameHud" hidden>
    <button class="gamehud__chip" id="hudChip" type="button" aria-expanded="false" aria-controls="hudPanel">
      <span class="gamehud__code" id="hudCode">····</span>
      <ul class="gamehud__dots" id="hudDots" aria-hidden="true"></ul>
    </button>
    <div class="gamehud__panel" id="hudPanel" hidden>
      <div class="gamehud__qr" id="hudQr"></div>
      <p class="gamehud__hint">Scan to join or rejoin</p>
      <ul class="gamehud__roster" id="hudRoster"></ul>
    </div>
  </div>

  <!-- QR generator (MIT, vendored) — exposes global `qrcode`; loaded before the
       module so app.js can render the scan-to-join code. -->
  <script src="./assets/js/vendor/qrcode.js?v=4b1daaa6-654b-4e0e-b997-cda2d635aa15"></script>
  <script type="module" src="./assets/js/app.js?v=4b1daaa6-654b-4e0e-b997-cda2d635aa15"></script>
</body>
</html>
